<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartChef AI | Your Kitchen Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --color-bg: #fefae0;
            --color-dark-green: #283618;
            --color-sage: #606c38;
            --color-earth-light: #dda15e;
            --color-earth-dark: #bc6c25;
            --color-white-glass: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-dark-green);
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .glass-card {
            background: var(--color-white-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 40px rgba(40, 54, 24, 0.08);
            border-radius: 32px;
        }

        .status-orb {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 20px rgba(96, 108, 56, 0.15);
            position: relative;
            margin-bottom: 20px;
            z-index: 10;
        }

        .orb-ring {
            position: absolute;
            width: 120%;
            height: 120%;
            border: 2px dashed var(--color-earth-light);
            border-radius: 50%;
            animation: rotate 15s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .recipe-viewport {
            width: 95%;
            max-width: 650px;
            height: 55vh;
            overflow-y: auto;
            padding: 30px;
            scrollbar-width: thin;
            scrollbar-color: var(--color-sage) transparent;
            z-index: 5;
            transition: all 0.5s ease;
        }

        .recipe-viewport::-webkit-scrollbar {
            width: 6px;
        }

        .recipe-viewport::-webkit-scrollbar-thumb {
            background-color: var(--color-sage);
            border-radius: 10px;
        }

        .recipe-title {
            font-family: 'Playfair Display', serif;
            color: var(--color-dark-green);
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .step-item {
            opacity: 0;
            transform: translateY(15px);
            animation: fadeInUp 0.6s forwards;
            padding: 12px 0;
            border-bottom: 1px solid rgba(40, 54, 24, 0.06);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .human-cook-container {
            position: fixed;
            bottom: 0;
            right: -20px;
            width: 350px;
            pointer-events: none;
            z-index: 20;
            filter: drop-shadow(-10px 0 30px rgba(0, 0, 0, 0.05));
        }

        .chef-wave {
            animation: wave 3s infinite ease-in-out;
            transform-origin: 130px 100px;
        }

        @keyframes wave {

            0%,
            100% {
                transform: rotate(0deg);
            }

            50% {
                transform: rotate(-10deg);
            }
        }

        .chat-dock {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            padding: 8px 12px;
            background: white;
            border-radius: 100px;
            display: flex;
            align-items: center;
            box-shadow: 0 20px 50px rgba(40, 54, 24, 0.15);
            border: 1px solid rgba(96, 108, 56, 0.2);
            z-index: 30;
        }

        input {
            flex: 1;
            border: none;
            outline: none;
            padding: 12px 20px;
            font-size: 1rem;
            color: var(--color-dark-green);
            background: transparent;
        }

        .send-btn {
            background: var(--color-earth-dark);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .send-btn:hover {
            background: var(--color-sage);
            transform: scale(1.1) rotate(5deg);
        }

        .typing-dots {
            display: none;
            gap: 6px;
            padding: 20px;
            justify-content: center;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: var(--color-earth-light);
            border-radius: 50%;
            animation: pulse 1.4s infinite ease-in-out;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(0.7);
                opacity: 0.4;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        .leaf {
            position: absolute;
            pointer-events: none;
            opacity: 0.1;
            z-index: 0;
            animation: float 10s infinite ease-in-out;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }

            50% {
                transform: translate(20px, -20px) rotate(15deg);
            }
        }
    </style>
</head>

<body>

    <div id="particle-canvas" class="fixed inset-0 overflow-hidden pointer-events-none"></div>

    <header class="pt-10 pb-6 text-center z-10">
        <h1 class="text-3xl font-bold tracking-tight text-[#283618] flex items-center justify-center gap-2">
            SmartChef<span class="text-[#bc6c25]">AI</span>
        </h1>
        <p class="text-[10px] tracking-[0.3em] font-semibold text-[#606c38] uppercase mt-1">Intelligent Culinary
            Assistant</p>
    </header>

    <main class="flex-1 flex flex-col items-center w-full px-4 relative">

        <div id="presence-orb" class="status-orb">
            <div class="orb-ring"></div>
            <span class="text-2xl">🌿</span>
        </div>

        <div id="display-container" class="recipe-viewport glass-card">
            <div id="welcome-state" class="h-full flex flex-col items-center justify-center text-center px-6">
                <h2 class="text-2xl font-serif italic text-[#283618] mb-3">Welcome to SmartChef!</h2>
                <p class="text-sm text-[#606c38] max-w-xs leading-relaxed">I can help you craft the perfect meal. What
                    are we cooking today?</p>
            </div>

            <div id="typing-indicator" class="typing-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>

            <div id="recipe-content"></div>
        </div>

        <div class="human-cook-container">
            <svg viewBox="0 0 300 500" xmlns="http://www.w3.org/2000/svg">
                <!-- Hair -->
                <path d="M120 120 Q150 80 180 120 L185 160 Q150 170 115 160 Z" fill="#423630" />
                <!-- Face -->
                <ellipse cx="150" cy="170" rx="45" ry="55" fill="#fbd38d" />
                <!-- Chef Hat -->
                <path d="M110 125 L190 125 L195 70 Q150 40 105 70 Z" fill="#ffffff" stroke="#283618" stroke-width="2" />
                <path d="M110 125 L110 105 Q150 100 190 105 L190 125" fill="#ffffff" stroke="#283618"
                    stroke-width="2" />
                <!-- Features -->
                <circle cx="135" cy="165" r="3" fill="#283618" />
                <circle cx="165" cy="165" r="3" fill="#283618" />
                <path d="M140 190 Q150 200 160 190" fill="none" stroke="#bc6c25" stroke-width="2"
                    stroke-linecap="round" />
                <!-- Body -->
                <path d="M100 230 Q150 220 200 230 L220 500 L80 500 Z" fill="#ffffff" stroke="#283618"
                    stroke-width="2" />
                <rect x="115" y="250" width="70" height="90" rx="5" fill="#606c38" opacity="0.8" />
                <!-- Waving Arm -->
                <g class="chef-wave">
                    <path d="M100 240 Q60 220 50 180" fill="none" stroke="#fbd38d" stroke-width="20"
                        stroke-linecap="round" />
                    <circle cx="50" cy="180" r="15" fill="#fbd38d" />
                </g>
                <!-- Static Arm -->
                <path d="M200 240 Q240 260 250 300" fill="none" stroke="#fbd38d" stroke-width="20"
                    stroke-linecap="round" />
            </svg>
        </div>

        <div class="chat-dock">
            <input type="text" id="recipe-input" placeholder="What's on the menu? (e.g. Chicken Biryani)"
                autocomplete="off">
            <button id="send-button" class="send-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </main>

    <script>
        const input = document.getElementById('recipe-input');
        const sendBtn = document.getElementById('send-button');
        const container = document.getElementById('recipe-content');
        const welcome = document.getElementById('welcome-state');
        const typing = document.getElementById('typing-indicator');
        async function fetchRecipe() {

            const query = input.value.trim();

            if (!query) return;

            input.value = '';

            welcome.classList.add('hidden');

            container.innerHTML = '';

            typing.style.display = 'flex';

            try {

                const response = await fetch(
                    "http://127.0.0.1:5001/recipe",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            recipe: query
                        })
                    }
                );

                const recipe = await response.json();

                typing.style.display = 'none';

                renderRecipe(recipe);

            } catch (error) {

                typing.style.display = 'none';

                container.innerHTML = `
            <p style="color:red; text-align:center;">
                Failed to connect backend
            </p>
        `;

                console.log(error);
            }
        }

        function renderRecipe(recipe) {
            let html = `
                <div class="mb-6">
                    <h2 class="recipe-title">${recipe.name}</h2>
                    <p class="text-xs text-[#606c38] italic mb-4">${recipe.description}</p>
                    <div class="flex gap-4 mb-6">
                        <span class="text-[9px] uppercase tracking-widest bg-[#dda15e] bg-opacity-20 px-3 py-1 rounded-full text-[#bc6c25] font-bold">Prep: ${recipe.prep}</span>
                        <span class="text-[9px] uppercase tracking-widest bg-[#606c38] bg-opacity-20 px-3 py-1 rounded-full text-[#283618] font-bold">Cook: ${recipe.cook}</span>
                    </div>
                </div>
                <div class="mb-8">
                    <h3 class="text-[10px] font-bold uppercase tracking-widest text-[#bc6c25] mb-3 border-b border-[#bc6c25] border-opacity-10 pb-1">Ingredients</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-4 gap-y-1">
                        ${recipe.ingredients.map((ing, i) => `
                            <div class="step-item text-xs flex items-center gap-2" style="animation-delay: ${i * 0.05}s">
                                <span class="text-[10px]">✨</span> ${ing}
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div>
                    <h3 class="text-[10px] font-bold uppercase tracking-widest text-[#bc6c25] mb-3 border-b border-[#bc6c25] border-opacity-10 pb-1">The Method</h3>
                    <div>
                        ${recipe.steps.map((step, i) => `
                            <div class="step-item flex gap-3" style="animation-delay: ${(recipe.ingredients.length + i) * 0.08}s">
                                <span class="font-serif italic text-xl text-[#dda15e] opacity-50">${i + 1}</span>
                                <p class="text-xs leading-relaxed pt-1">${step}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="h-10"></div>
            `;
            container.innerHTML = html;
        }

        function createBackground() {
            const area = document.getElementById('particle-canvas');
            const icons = ['🌿', '🍂', '🧂', '🥘'];
            for (let i = 0; i < 12; i++) {
                const el = document.createElement('div');
                el.className = 'leaf';
                el.innerText = icons[Math.floor(Math.random() * icons.length)];
                el.style.left = Math.random() * 100 + 'vw';
                el.style.top = Math.random() * 100 + 'vh';
                el.style.fontSize = (Math.random() * 10 + 20) + 'px';
                el.style.animationDelay = (Math.random() * 5) + 's';
                area.appendChild(el);
            }
        }

        sendBtn.addEventListener('click', fetchRecipe);
        input.addEventListener('keypress', (e) => e.key === 'Enter' && fetchRecipe());
        window.onload = createBackground;
    </script>
</body>

</html>
